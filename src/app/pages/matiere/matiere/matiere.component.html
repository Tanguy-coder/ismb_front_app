<div>
    <app-page-breadcrumb pageTitle="Gestion des Matières" />

    <!-- Form Section -->
    <div class="rounded-sm border border-stroke  p-4 mb-6">
        <h3 class="font-medium text-black dark:text-white text-lg mb-4">{{ editMode ? 'Modifier' : 'Créer' }} une Matière</h3>
        <form (ngSubmit)="onSubmit()" #myForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <app-label>Libellé</app-label>
                    <app-input-field
                        placeholder="Ex : Algorithmique"
                        id="libelle"
                        [(ngModel)]="matiere.libelle"
                        name="libelle"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Sigle</app-label>
                    <app-input-field
                        placeholder="Ex : ALGO"
                        id="sigle"
                        [(ngModel)]="matiere.sigle"
                        name="sigle"
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Type</app-label>
                    <app-input-field
                        placeholder="Ex : Scientifique"
                        id="type"
                        [(ngModel)]="matiere.type"
                        name="type"
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Niveau</app-label>
                    <app-multi-select
                        [options]="multiSelectOptions"
                        [defaultSelected]="selectedNiveauIds"
                        (selectionChange)="onNiveauxSelectionChange($event)"
                    ></app-multi-select>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <app-button
                    size="md"
                    variant="primary"
                    type="submit"
                >
                    {{ editMode ? "Mettre à jour" : "Créer" }}
                </app-button>
                <app-button
                    *ngIf="editMode"
                    size="md"
                    (click)="resetForm()"
                >
                    Annuler
                </app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <app-datatable
      [data]="matieres"
      [columns]="columns"
      title="Liste des Matières"
      fileName="matieres"
      [showExportButtons]="true"
      [pageSize]="10"
      (onEdit)="onEdit($event)"
      (onDelete)="onDelete($event)">
    </app-datatable>
</div>
