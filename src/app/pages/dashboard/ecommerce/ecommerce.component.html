<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  <!-- Card Students -->
  <div class="rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-white/[0.03]">
    <div class="flex items-center gap-4">
      <div class="flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-blue-500 dark:bg-blue-500/20">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
          </path>
        </svg>
      </div>
      <div>
        <span class="block text-sm font-medium text-gray-500 dark:text-gray-400">Total Étudiants</span>
        <h3 class="text-2xl font-bold text-gray-900 dark:text-white">{{ stats.students }}</h3>
      </div>
    </div>
  </div>

  <!-- Card Teachers -->
  <div class="rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-white/[0.03]">

      <div
        class="flex items-center justify-center w-12 h-12 rounded-full bg-green-50 text-green-500 dark:bg-green-500/20">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">

        </svg>
      </div>
      <div>
        <span class="block text-sm font-medium text-gray-500 dark:text-gray-400">Total Enseignants</span>
        <h3 class="text-2xl font-bold text-gray-900 dark:text-white">{{ stats.teachers }}</h3>
      </div>
    </div>
  </div>

  <!-- Card Classes -->
  <div class="rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-white/[0.03]">
    <div class="flex items-center gap-4">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-full bg-purple-50 text-purple-500 dark:bg-purple-500/20">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

      </div>
      <div>
        <span class="block text-sm font-medium text-gray-500 dark:text-gray-400">Total Filières</span>
        <h3 class="text-2xl font-bold text-gray-900 dark:text-white">{{ stats.classes }}</h3>
      </div>
    </div>
