<div>
    <app-page-breadcrumb pageTitle="Année Académique" />

    <!-- Form Section -->
    <div class="rounded-sm border border-stroke  p-4 mb-6">
        <h3 class="font-medium text-black dark:text-white text-lg mb-4">{{ editMode ? 'Modifier' : 'Créer' }} une Année Académique</h3>
        <form (ngSubmit)="onSubmit()" #myForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <app-label>Code</app-label>
                    <app-input-field
                        placeholder="Ex : 2025-2026"
                        id="code"
                        [(ngModel)]="annee.code"
                        name="code"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Date début</app-label>
                    <app-input-field
                        id="dateDebut"
                        type="date"
                        [(ngModel)]="annee.dateDebut"
                        name="dateDebut"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Date Fin</app-label>
                    <app-input-field
                        id="dateFin"
                        type="date"
                        [(ngModel)]="annee.dateFin"
                        name="dateFin"
                        required
                    ></app-input-field>
                </div>
            </div>

            

            <div class="flex justify-end gap-4 mt-6">
                <app-button
                    size="md"
                    variant="primary"
                    type="submit"
                >
                    {{ editMode ? "Mettre à jour" : "Créer" }}
                </app-button>
                <app-button
                    *ngIf="editMode"
                    size="md"
                    (click)="resetForm()"
                >
                    Annuler
                </app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <app-datatable
      [data]="annees"
      [columns]="columns"
      title="Liste des Années Académiques"
      fileName="annees-scolaires"
      [showExportButtons]="true"
      [pageSize]="10"
      (onEdit)="onEdit($event)"
      (onDelete)="onDelete($event)">
    </app-datatable>
</div>
