<div>
    <app-page-breadcrumb pageTitle="Année Académique" />

    <!-- Form Section -->
    <div *ngIf="showForm" class="rounded-sm border border-stroke  p-4 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-medium text-black dark:text-white text-lg">{{ editMode ? 'Modifier' : 'Créer' }} une Année Académique</h3>
            <button 
                (click)="resetForm()" 
                class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                type="button"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <form (ngSubmit)="onSubmit()" #myForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <app-label>Code</app-label>
                    <app-input-field
                        placeholder="Ex : 2025-2026"
                        id="code"
                        [(ngModel)]="annee.code"
                        name="code"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Date début</app-label>
                    <app-input-field
                        id="dateDebut"
                        type="date"
                        [(ngModel)]="annee.dateDebut"
                        name="dateDebut"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Date Fin</app-label>
                    <app-input-field
                        id="dateFin"
                        type="date"
                        [(ngModel)]="annee.dateFin"
                        name="dateFin"
                        required
                    ></app-input-field>
                </div>
            </div>

            

            <div class="flex justify-end gap-4 mt-6">
                <app-button
                    size="md"
                    variant="primary"
                    type="submit"
                >
                    {{ editMode ? "Mettre à jour" : "Créer" }}
                </app-button>
                <app-button
                    size="md"
                    (click)="resetForm()"
                >
                    Annuler
                </app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <div class="rounded-sm border border-stroke bg-white dark:bg-gray-dark">
        <div class="flex justify-between items-center px-6 py-4 border-b border-stroke dark:border-gray-700">
            <h3 class="font-medium text-black dark:text-white text-lg">Liste des Années Académiques</h3>
            <app-button *ngIf="!showForm" (click)="showAddForm()" variant="primary">
                + Ajouter une Année Académique
            </app-button>
        </div>
        <app-datatable
          [data]="annees"
          [columns]="columns"
          title=""
          fileName="annees-scolaires"
          [showExportButtons]="true"
          [pageSize]="10"
          (onEdit)="onEdit($event)"
          (onDelete)="onDelete($event)">
        </app-datatable>
    </div>
</div>
