<div>
    <app-page-breadcrumb pageTitle="Gestion des Filières" />

    <!-- Form Section -->
    <div class="rounded-sm border border-stroke  p-4 mb-6">
        <h3 class="font-medium text-black dark:text-white text-lg mb-4">{{ editMode ? 'Modifier' : 'Créer' }} une Filière</h3>
        <form (ngSubmit)="onSubmit()" #myForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <app-label>Libellé</app-label>
                    <app-input-field
                        placeholder="Ex : Génie Logiciel"
                        id="libelle"
                        [(ngModel)]="filiere.libelle"
                        name="libelle"
                        required
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Description</app-label>
                    <app-input-field
                        placeholder="Description de la filière"
                        id="description"
                        [(ngModel)]="filiere.description"
                        name="description"
                    ></app-input-field>
                </div>
                <div>
                    <app-label>Niveau</app-label>
                    <select
                        id="niveau"
                        [(ngModel)]="filiere.niveau"
                        name="niveau"
                        required
                        class="dark:bg-dark-900 h-[42px] w-full rounded-lg border
                         border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs
                          placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3
                           focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900
                            dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
                    >
                        <option [ngValue]="undefined" disabled>Sélectionner un niveau</option>
                        <option *ngFor="let n of niveaux" [ngValue]="n">{{ n.libelle }}</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <app-button
                    size="md"
                    variant="primary"
                    type="submit"
                >
                    {{ editMode ? "Mettre à jour" : "Créer" }}
                </app-button>
                <app-button
                    *ngIf="editMode"
                    size="md"
                    (click)="resetForm()"
                >
                    Annuler
                </app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <div class="rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">
      <div class="flex flex-col gap-2 px-5 mb-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
        <div>
          <h4 class="text-xl font-semibold text-black dark:text-white">Liste des Filières</h4>
        </div>
        <div class="flex items-center gap-3">
          <app-label class="whitespace-nowrap text-sm">Année Académique :</app-label>
          <select
            [(ngModel)]="selectedAnneeScolaire"
            (ngModelChange)="onAnneeScolaireChange()"
            class="dark:bg-dark-900 h-[38px] rounded-lg border border-gray-300 bg-transparent py-2 px-3 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 min-w-[180px]"
          >
            <option [ngValue]="undefined">Toutes les années</option>
            <option *ngFor="let annee of anneesScolaires" [ngValue]="annee">{{ annee.code }}</option>
          </select>
        </div>
      </div>

      <!-- Tableau simple -->
      <div class="overflow-x-auto px-5 pb-4">
        <table class="w-full">
          <thead>
            <tr class="border-b border-gray-200 dark:border-white/[0.05]">
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-white">Libellé</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-white">Description</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-white">Niveau</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-white">Liste</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700 dark:text-white">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let f of filieres" class="border-b border-gray-200 dark:border-white/[0.05] hover:bg-gray-50 dark:hover:bg-white/[0.02]">
              <td class="px-4 py-3 text-sm text-gray-800 dark:text-white/90">{{ f.libelle }}</td>
              <td class="px-4 py-3 text-sm text-gray-800 dark:text-white/90">{{ f.description }}</td>
              <td class="px-4 py-3 text-sm text-gray-800 dark:text-white/90">{{ f.niveau?.libelle }}</td>
              <td class="px-4 py-3 text-sm">
                <button 
                  (click)="onListeClasseClick(f.id!)"
                  class="px-3 py-1 text-sm font-medium text-brand-500 hover:text-brand-600 border border-brand-300 rounded-lg hover:bg-brand-50 dark:hover:bg-brand-900/20 dark:border-brand-700">
                  liste classe
                </button>
              </td>
              <td class="px-4 py-3 text-sm">
                <div class="flex items-center gap-2">
                  <button 
                    (click)="onEdit(f)"
                    class="px-3 py-1 text-sm font-medium text-blue-500 hover:text-blue-600 border border-blue-300 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 dark:border-blue-700">
                    Modifier
                  </button>
                  <button 
                    (click)="onDelete(f)"
                    class="px-3 py-1 text-sm font-medium text-red-500 hover:text-red-600 border border-red-300 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 dark:border-red-700">
                    Supprimer
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
</div>
