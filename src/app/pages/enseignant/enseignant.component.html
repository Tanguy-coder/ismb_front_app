<div>
    <app-page-breadcrumb pageTitle="Enseignants" />

    <!-- Form Section -->
    <div class="rounded-sm border border-stroke p-4 mb-6">
        <h3 class="font-medium text-black dark:text-white text-lg mb-4">{{ editMode ? 'Modifier' : 'Créer' }} un Enseignant</h3>
        <form (ngSubmit)="onSubmit()" #enseignantForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <app-label for="nom">Nom</app-label>
                    <app-input-field id="nom" name="nom" [(ngModel)]="enseignant.nom" required />
                </div>
                <div>
                    <app-label for="prenom">Prénom</app-label>
                    <app-input-field id="prenom" name="prenom" [(ngModel)]="enseignant.prenom" required />
                </div>
                <div>
                    <app-label for="email">Email</app-label>
                    <app-input-field id="email" name="email" type="email" [(ngModel)]="enseignant.email" required [pattern]="emailPattern" />
                </div>

                <div>
                    <app-label for="date_naissance">Date de naissance</app-label>
                    <app-input-field id="date_naissance" name="dateNaissance" type="date" [(ngModel)]="enseignant.dateNaissance" />
                </div>
                <div>
                    <app-label for="lieu_naissance">Lieu de naissance</app-label>
                    <app-input-field id="lieu_naissance" name="lieuNaissance" [(ngModel)]="enseignant.lieuNaissance" />
                </div>
                 <div>
                    <app-label for="sexe">Sexe</app-label>
                    <select id="sexe" name="sexe" [(ngModel)]="enseignant.sexe"
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border
                         border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs
                          placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3
                           focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900
                            dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
                    >
                        <option value="M">Masculin</option>
                        <option value="F">Feminin</option>
                    </select>
                </div>
                <div>
                    <app-label for="nationalite">Nationalité</app-label>
                    <app-input-field id="nationalite" name="nationalite" [(ngModel)]="enseignant.nationalite" />
                </div>
                <div>
                    <app-label for="telephone">Téléphone</app-label>
                    <app-input-field id="telephone" name="telephone" [(ngModel)]="enseignant.contact" />
                </div>
                <div>
                    <app-label for="photo-upload">Photo</app-label>
                    <input type="file" id="photo-upload" (change)="onPhotoFileSelected($event)" class="w-full rounded-md border border-stroke p-2 text-black dark:text-white">
                    <small *ngIf="editMode && enseignant.photo" class="text-gray-500">Actuelle : {{ enseignant.photo }}. Laisser vide pour ne pas changer.</small>
                    <div *ngIf="photoPreviewUrl" class="mt-2">
                        <img [src]="photoPreviewUrl" alt="Prévisualisation" class="h-20 w-20 rounded-lg object-cover border border-gray-200 dark:border-gray-700" />
                    </div>
                </div>
                <div>
                    <app-label for="statut">Statut</app-label>
                    <select id="statut" name="statut" [(ngModel)]="enseignant.statut"
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border
                         border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs
                          placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3
                           focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900
                            dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
                    >
                        <option value="Actif">Actif</option>
                        <option value="Inactif">Inactif</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <app-button type="submit" variant="primary">{{ editMode ? "Mettre à jour" : "Créer" }}</app-button>
                <app-button *ngIf="editMode" (click)="resetForm()">Annuler</app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <app-datatable
      [data]="enseignants"
      [columns]="columns"
      title="Liste des Enseignants"
      fileName="enseignants"
      [showExportButtons]="true"
      [pageSize]="10"
      (onEdit)="onEdit($event)"
      (onDelete)="onDelete($event)">
    </app-datatable>
</div>
