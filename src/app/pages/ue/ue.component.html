<div>
    <app-page-breadcrumb pageTitle="Unités d'Enseignement (UE)" />

    <!-- Form Section -->
    <div class="rounded-sm border border-stroke p-4 mb-6">
        <h3 class="font-medium text-black dark:text-white text-lg mb-4">{{ editMode ? 'Modifier' : 'Créer' }} une UE</h3>
        <form (ngSubmit)="onSubmit()" #ueForm="ngForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <app-label for="libelle">Libellé</app-label>
                    <app-input-field id="libelle" name="libelle" [(ngModel)]="ue.libelle" required />
                </div>
                <div>
                    <app-label for="credits">Crédits</app-label>
                    <app-input-field id="credits" name="credits" type="number" [(ngModel)]="ue.credits" required />
                </div>
                <div>
                    <app-label for="volumeHoraire">Volume Horaire</app-label>
                    <app-input-field id="volumeHoraire" name="volumeHoraire" type="number" [(ngModel)]="ue.volumeHoraire" required />
                </div>

                <div>
                    <app-label for="filiere">Filière</app-label>
                    <select id="filiere" name="filiere" [(ngModel)]="ue.filiere" [compareWith]="compareById" required
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800">
                        <option *ngFor="let filiere of filieres" [ngValue]="filiere">{{ filiere.libelle }}</option>
                    </select>
                </div>

                <div>
                    <app-label for="matiere">Matière</app-label>
                    <select id="matiere" name="matiere" [(ngModel)]="ue.matiere" [compareWith]="compareById" required
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800">
                        <option *ngFor="let matiere of matieres" [ngValue]="matiere">{{ matiere.libelle }}</option>
                    </select>
                </div>

                <div>
                    <app-label for="enseignant">Enseignant</app-label>
                    <select id="enseignant" name="enseignant" [(ngModel)]="ue.enseignant" [compareWith]="compareById" required
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800">
                        <option *ngFor="let enseignant of enseignants" [ngValue]="enseignant">{{ enseignant.nom }} {{ enseignant.prenom }}</option>
                    </select>
                </div>

                <div>
                    <app-label for="anneeScolaire">Année Scolaire</app-label>
                    <select id="anneeScolaire" name="anneeScolaire" [(ngModel)]="ue.anneeScolaire" [compareWith]="compareById" required
                            class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800">
                        <option *ngFor="let annee of anneesScolaires" [ngValue]="annee">{{ annee.code }}</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-4 mt-6">
                <app-button type="submit" variant="primary">{{ editMode ? "Mettre à jour" : "Créer" }}</app-button>
                <app-button *ngIf="editMode" (click)="resetForm()">Annuler</app-button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <app-datatable
      [data]="ues"
      [columns]="columns"
      title="Liste des UEs"
      fileName="ues"
      [showExportButtons]="true"
      [pageSize]="10"
      (onEdit)="onEdit($event)"
      (onDelete)="onDelete($event)">
    </app-datatable>
</div>
