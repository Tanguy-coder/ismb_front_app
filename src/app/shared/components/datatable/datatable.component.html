<div class="rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">
  <div class="flex flex-col gap-2 px-5 mb-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
    <div>
      <h4 class="text-xl font-semibold text-black dark:text-white">{{ title }}</h4>
    </div>
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
      <div class="relative">
        <input
          type="text"
          [placeholder]="searchPlaceholder"
          [(ngModel)]="searchTerm"
          (ngModelChange)="applySearch()"
          class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 pl-10 pr-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 xl:w-[300px]"
        />
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 fill-gray-500 dark:fill-gray-400" width="20" height="20" viewBox="0 0 20 20">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M3.04199 9.37381C3.04199 5.87712 5.87735 3.04218 9.37533 3.04218C12.8733 3.04218 15.7087 5.87712 15.7087 9.37381C15.7087 12.8705 12.8733 15.7055 9.37533 15.7055C5.87735 15.7055 3.04199 12.8705 3.04199 9.37381ZM9.37533 1.54218C5.04926 1.54218 1.54199 5.04835 1.54199 9.37381C1.54199 13.6993 5.04926 17.2055 9.37533 17.2055C11.2676 17.2055 13.0032 16.5346 14.3572 15.4178L17.1773 18.2381C17.4702 18.531 17.945 18.5311 18.2379 18.2382C18.5308 17.9453 18.5309 17.4704 18.238 17.1775L15.4182 14.3575C16.5367 13.0035 17.2087 11.2671 17.2087 9.37381C17.2087 5.04835 13.7014 1.54218 9.37533 1.54218Z"></path>
        </svg>
      </div>
      <div class="flex gap-2" *ngIf="showExportButtons">
        <app-button 
          (click)="exportToExcel()" 
          variant="primary" 
          size="sm"
          class="flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          Excel
        </app-button>
        <app-button 
          (click)="exportToPDF()" 
          variant="primary" 
          size="sm"
          class="flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
          </svg>
          PDF
        </app-button>
      </div>
    </div>
  </div>

  <div class="max-w-full overflow-x-auto">
    <table class="min-w-full">
      <thead class="border-gray-100 border-y dark:border-white/[0.05]">
        <tr>
          <th *ngFor="let column of columns" 
              class="py-3 px-4 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800"
              [class.cursor-pointer]="column.sortable"
              (click)="sort(column)">
            <div class="flex items-center gap-2">
              {{ column.label }}
              <span *ngIf="column.sortable" class="text-xs">{{ getSortIcon(column) }}</span>
            </div>
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 dark:divide-white/[0.05]">
        <tr *ngFor="let row of paginatedData">
          <td *ngFor="let column of columns" 
              class="px-4 py-4 text-gray-700 dark:text-gray-400">
            <ng-container *ngIf="column.isAction && actionTemplate">
              <ng-container *ngTemplateOutlet="actionTemplate; context: { $implicit: row, onEdit: handleEdit.bind(this), onDelete: handleDelete.bind(this) }"></ng-container>
            </ng-container>
            <ng-container *ngIf="column.isAction && !actionTemplate">
              <div class="flex items-center space-x-3.5">
                <button 
                  (click)="handleEdit(row)" 
                  class="font-medium text-brand-500 hover:text-brand-600">
                  Modifier
                </button>
                <button 
                  (click)="handleDelete(row)" 
                  class="font-medium text-error-500 hover:text-error-600">
                  Supprimer
                </button>
              </div>
            </ng-container>
            <span *ngIf="!column.isAction" [innerHTML]="getCellValue(row, column)"></span>
          </td>
        </tr>
        <tr *ngIf="filteredData.length === 0">
          <td [attr.colspan]="columns.length" class="py-10 text-center">
            Aucune donnée trouvée.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="flex flex-col sm:flex-row items-center justify-between gap-4 px-5 py-4 border-t border-gray-200 dark:border-white/[0.05]">
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-700 dark:text-gray-400">Afficher</span>
      <select 
        [(ngModel)]="pageSize" 
        (ngModelChange)="changePageSize(pageSize)"
        class="dark:bg-dark-900 h-[32px] rounded border border-gray-300 bg-transparent px-2 text-sm text-gray-800 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
        <option *ngFor="let size of pageSizes" [value]="size">{{ size }}</option>
      </select>
      <span class="text-sm text-gray-700 dark:text-gray-400">entrées</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-700 dark:text-gray-400">
        Affichage de {{ (currentPage - 1) * pageSize + 1 }} à {{ Math.min(currentPage * pageSize, filteredData.length) }} sur {{ filteredData.length }}
      </span>
      <div class="flex gap-1">
        <button 
          (click)="changePage(currentPage - 1)"
          [disabled]="currentPage === 1"
          class="px-3 py-1 rounded border border-gray-300 dark:border-gray-700 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-800">
          Précédent
        </button>
        <button 
          (click)="changePage(currentPage + 1)"
          [disabled]="currentPage === totalPages"
          class="px-3 py-1 rounded border border-gray-300 dark:border-gray-700 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-800">
          Suivant
        </button>
      </div>
    </div>
  </div>
</div>
