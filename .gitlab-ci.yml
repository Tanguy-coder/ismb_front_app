# GitLab CI for Angular 20 app with Docker image build & push

stages:
  - build
  - docker

default:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

variables:
  NODE_OPTIONS: --max-old-space-size=4096

build_app:
  stage: build
  image: node:20-alpine
  variables:
    # Ensure devDependencies are installed so Angular CLI (ng) is available
    NPM_CONFIG_PRODUCTION: "false"
    NODE_ENV: development
  before_script:
    - npm ci --legacy-peer-deps || npm i --legacy-peer-deps
  script:
    - npm run build
  artifacts:
    name: "dist-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/ng-tailadmin/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

docker_build_push:
  stage: docker
  image: docker:25
  services:
    - name: docker:25-dind
      alias: docker
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    NODE_ENV: production
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      IMAGE="$CI_REGISTRY_IMAGE"
      TAG_COMMIT="$IMAGE:$CI_COMMIT_SHORT_SHA"
      TAG_REF="$IMAGE:$CI_COMMIT_REF_SLUG"
      TAG_LATEST="$IMAGE:latest"

      echo "Building image: $TAG_COMMIT"
      docker build -t "$TAG_COMMIT" .

      # Always push commit and ref tags; push latest only on default branch
      docker push "$TAG_COMMIT"
      docker tag "$TAG_COMMIT" "$TAG_REF"
      docker push "$TAG_REF"

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$TAG_COMMIT" "$TAG_LATEST"
        docker push "$TAG_LATEST"
      fi
  needs:
    - job: build_app
      optional: true
  rules:
    # Push images only for default branch and tags; build without push on MRs is skipped here
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
